apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: services
  labels:
    app: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: agilesolutions/product-service:1.0.1
          ports:
            - containerPort: 8084