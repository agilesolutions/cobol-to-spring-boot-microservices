server:
  port: 8084

management:
  endpoint:
    health:
      show-details: ALWAYS
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus, refresh, bus-refresh, bus-env
  tracing:
    sampling:
      probability: 1.0  # 100% sampling for development
  otlp:
    metrics:
      export:
        url: http://${LGTM_SERVICE_URL}:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://${LGTM_SERVICE_URL}:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://${LGTM_SERVICE_URL}:4318/v1/logs


spring:
  application:
    name: product-service
  config:
    import: ${SPRING_CONFIG_IMPORT}
  # Spring Bus for RabbitMQ to refresh configuration across services
  rabbitmq:
    host: ${RABBITMQ_SERVICE_URL}
    port: 5672
    username: "guest"
    password: "guest"
  mvc:
    apiversion:
        use-header: true

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}

springdoc:
  #  enable-spring-security: true
  #  show-login-endpoint: true
  #  show-oauth2-endpoints: true
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

twelvedata:
  api:
    url: https://api.twelvedata.com/
    key: demo

service:
  retry:
    initial_delay: 1000
    max-delay: 5000
    multiplier: 2.0
    max-attempts: 3

logging:
  level:
    root: INFO

info:
  app:
    name: "Product Service"
    description: "Service responsible for managing product information and providing product-related APIs."
    version: "1.0.0"