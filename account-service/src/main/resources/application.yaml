server:
  port: 8082

spring:
  application:
    name: account-service
  config:
    import: "optional:configserver:http://localhost:8091/"
  # Spring Bus for RabbitMQ to refresh configuration across services
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
  mvc:
    enabled: true
    apiversion:
      use:
        header: API-Version
  cloud:
    bus:
      openfeign:
        circuitbreaker:
          enabled: true
  datasource:
    url: jdbc:h2:mem:testdb;SCHEMA=public;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: admin
    driverClassName: org.h2.Driver
  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
        hibernate:
            format_sql: true
            show_sql: true
            default_schema: public
  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
  sql:
    init:
      mode: never   # disable schema.sql/data.sql when using Flyway

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 2
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      ignoredExceptions:
        - java.net.SocketTimeoutException
        - NullPointerException

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  #  enable-spring-security: true
  #  show-login-endpoint: true
  #  show-oauth2-endpoints: true
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus, refresh, bus-refresh, bus-env
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0  # 100% sampling for development
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs


logging:
  level:
    com.agilesolutions.account: DEBUG
    org.springframework.security: INFO

info:
  app:
    name: "Account Service"
    description: "Manages customer accounts and profiles"
    version: "1.0.0"