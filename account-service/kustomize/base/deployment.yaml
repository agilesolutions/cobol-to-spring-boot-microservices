apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: services
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: agilesolutions/account-service:1.0.0
          ports:
            - containerPort: 8082
          env:
            - name: ACCOUNT_SERVICE_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: ACCOUNT_SERVICE_APPLICATION_NAME
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: LGTM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: LGTM_SERVICE_URL
            - name: RABBITMQ_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: RABBITMQ_SERVICE_URL