apiVersion: apps/v1
kind: Deployment
metadata:
  name: creditcard-service
  namespace: services
  labels:
    app: creditcard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: creditcard-service
  template:
    metadata:
      labels:
        app: creditcard-service
    spec:
      containers:
        - name: creditcard-service
          image: agilesolutions/creditcard-service:1.0.0
          ports:
            - containerPort: 8081
          env:
            - name: CREDIT_CARD_SERVICE_APPLICATION_NAME
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: CREDIT_CARD_SERVICE_APPLICATION_NAME
            - name: SPRING_CONFIG_IMPORT
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: SPRING_CONFIG_IMPORT
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            - name: LGTM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: LGTM_SERVICE_URL
            - name: RABBITMQ_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: RABBITMQ_SERVICE_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: services-configmap
                  key: REDIS_HOST
