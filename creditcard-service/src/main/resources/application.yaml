server:
  port: 8081

spring:
  application:
    name: creditcard-service
  config:
    import: "optional:configserver:http://localhost:8091/"
  # Spring Bus for RabbitMQ to refresh configuration across services
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"
  mvc:
    apiversion:
      use:
        header: "API-Version"
  datasource:
    url: jdbc:h2:mem:testdb;SCHEMA=public;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: admin
    driverClassName: org.h2.Driver
  jpa:
    defer-datasource-initialization: false
    database-platform: org.hibernate.dialect.H2Dialect
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        default_schema: public
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    out-of-order: false

  h2:
    console:
      enabled: true
      path: /h2-console


resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      permittedNumberOfCallsInHalfOpenState: 2
      failureRateThreshold: 50
      waitDurationInOpenState: 10000
      ignoredExceptions:
        - java.net.SocketTimeoutException
        - NullPointerException


eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus, refresh, bus-refresh, bus-env
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0  # 100% sampling for development
  otlp:
    metrics:
      export:
        url: http://localhost:4318/v1/metrics
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    logging:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/logs



springdoc:
  #  enable-spring-security: true
  #  show-login-endpoint: true
  #  show-oauth2-endpoints: true
  show-actuator: true
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.agilesolutions.card: DEBUG

info:
  app:
    name: "credit card service"
    description: "credit card service for demo application"
    version: "1.0.0"