apiVersion: v1
kind: ConfigMap
metadata:
  name: services-configmap
  namespace: services
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SPRING_CONFIG_IMPORT: "configserver:http://configuration-service:9091/"
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://discovery-service:8761/eureka/"
  CONFIGURATION_SERVICE_APPLICATION_NAME: "configserver_service"
  DISCOVERY_SERVICE_APPLICATION_NAME: "discovery-service"
  ACCOUNT_SERVICE_APPLICATION_NAME: "account-service"
  PRODUCT_SERVICE_APPLICATION_NAME: "product-service"
  CREDIT_CARD_SERVICE_APPLICATION_NAME: "credit_card_service"
  GATEWAY_APPLICATION_NAME: "gatewayserver"