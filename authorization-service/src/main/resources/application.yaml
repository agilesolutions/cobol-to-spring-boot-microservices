server:
  port: 8092

management:
  endpoint:
    health:
      show-details: ALWAYS
  tracing:
    enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true

spring:
  application:
    name: ${AUHORIZATION_SERVICE_APPLICATION_NAME}

eureka:
  instance:
    preferIpAddress: true
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}

info:
  app:
    name: "Authorization Service"
    description: "Authorization Service for the Banking Reference Application"
    version: "1.0.0"